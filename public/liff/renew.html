<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ต่ออายุ - Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding-bottom: 40px; }
    .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px; display: flex; align-items: center; gap: 12px; }
    .header a { color: #fff; text-decoration: none; font-size: 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .section { margin: 16px 16px 0; }
    .section-title { font-size: 13px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .email-card { background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
    .email-card.selected { border-color: #ff6b00; background: #1f1200; }
    .email-card .email { font-size: 15px; font-weight: 600; color: #fff; word-break: break-all; }
    .email-card .expire { font-size: 12px; margin-top: 4px; }
    .email-card .expire.green { color: #22c55e; }
    .email-card .expire.yellow { color: #f59e0b; }
    .email-card .expire.red { color: #ef4444; }
    .pkg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pkg-card { background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .pkg-card.selected { border-color: #ff6b00; background: #1f1200; }
    .pkg-card .months { font-size: 11px; color: #888; }
    .pkg-card .price { font-size: 20px; font-weight: 700; color: #ff9500; margin: 4px 0; }
    .pkg-card .baht { font-size: 11px; color: #666; }
    .upload-box { background: #1a1a1a; border: 2px dashed #333; border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; }
    .upload-box.has-image { border-color: #22c55e; border-style: solid; }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-text { font-size: 14px; color: #888; }
    input[type=file] { display: none; }
    .btn { width: 100%; background: #ff6b00; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .alert { border-radius: 10px; padding: 12px 14px; margin-top: 12px; font-size: 14px; line-height: 1.6; }
    .alert.error { background: #2a0a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .alert.success { background: #0a2a0a; border: 1px solid #22c55e; color: #86efac; }
    .loading { text-align: center; padding: 60px 20px; color: #666; }
    .not-found { text-align: center; padding: 60px 20px; }
    .not-found .icon { font-size: 48px; margin-bottom: 12px; }
    .not-found p { color: #888; font-size: 14px; line-height: 1.6; }
    .not-found a { color: #ff9500; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">←</a>
    <h1>🔄 ต่ออายุ</h1>
  </div>

  <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>

  <div id="not-found" class="not-found" style="display:none">
    <div class="icon">🔍</div>
    <p>ไม่พบข้อมูลสมาชิก<br><br>
    กรุณา <a href="register.html">สมัครสมาชิก</a> ก่อนนะครับ</p>
  </div>

  <div id="main-content" style="display:none">

    <div class="section">
      <div class="section-title">เลือกอีเมลที่ต้องการต่ออายุ</div>
      <div id="email-list"></div>
    </div>

    <div class="section">
      <div class="section-title">เลือกแพ็กเกจที่ต้องการต่อ</div>
      <div class="pkg-grid">
        <div class="pkg-card" data-pkg="1month" onclick="selectPkg(this)">
          <div class="months">1 เดือน</div>
          <div class="price">79</div>
          <div class="baht">บาท</div>
        </div>
        <div class="pkg-card" data-pkg="2months" onclick="selectPkg(this)">
          <div class="months">2 เดือน</div>
          <div class="price">155</div>
          <div class="baht">บาท</div>
        </div>
        <div class="pkg-card" data-pkg="3months" onclick="selectPkg(this)">
          <div class="months">3 เดือน</div>
          <div class="price">230</div>
          <div class="baht">บาท</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">แนบสลิปโอนเงิน</div>
      <div class="upload-box" id="upload-box" onclick="document.getElementById('slip-input').click()">
        <div id="upload-placeholder">
          <div class="upload-icon">📎</div>
          <div class="upload-text">แตะเพื่อแนบสลิป</div>
        </div>
        <img id="slip-preview" style="display:none; max-width:100%; border-radius:8px; max-height:200px;"/>
      </div>
      <input type="file" id="slip-input" accept="image/*" onchange="previewSlip(this)"/>
    </div>

    <div class="section">
      <div id="alert-box"></div>
      <button class="btn" id="submit-btn" onclick="submit()" disabled>ยืนยันต่ออายุ</button>
    </div>

  </div>

  <script>
    const LIFF_ID = '2009843737-CwJgLFBY';
    const BASE_URL = window.location.origin;
    let profile = null;
    let members = [];
    let selectedEmail = null;
    let selectedPkg = null;
    let slipFile = null;

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      profile = await liff.getProfile();

      const res = await fetch(`${BASE_URL}/api/members/${profile.userId}`);
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!data.found || data.members.length === 0) {
        document.getElementById('not-found').style.display = 'block';
        return;
      }

      members = data.members;
      document.getElementById('main-content').style.display = 'block';

      const emailList = document.getElementById('email-list');

      members.forEach((m, i) => {
        const days = m.daysLeft;
        const color = days > 7 ? 'green' : days > 0 ? 'yellow' : 'red';
        const expireText = days > 0
          ? `หมดอายุ ${m.expireDate} (เหลืออีก ${days} วัน)`
          : `❌ หมดอายุแล้ว (${m.expireDate})`;

        const card = document.createElement('div');
        card.className = 'email-card';
        card.dataset.index = i;
        card.innerHTML = `
          <div class="email">${m.houseEmail || 'ไม่มีอีเมล'}</div>
          <div class="expire ${color}">${expireText}</div>
        `;
        card.onclick = () => selectEmail(card, m.houseEmail);
        emailList.appendChild(card);

        if (members.length === 1) card.click();
      });
    }

    function selectEmail(el, email) {
      document.querySelectorAll('.email-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmail = email;
      checkReady();
    }

    function selectPkg(el) {
      document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedPkg = el.dataset.pkg;
      checkReady();
    }

    function previewSlip(input) {
      if (!input.files[0]) return;
      slipFile = input.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('slip-preview').src = e.target.result;
        document.getElementById('slip-preview').style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';
        document.getElementById('upload-box').classList.add('has-image');
      };
      reader.readAsDataURL(slipFile);
      checkReady();
    }

    function checkReady() {
      document.getElementById('submit-btn').disabled = !(selectedEmail && selectedPkg && slipFile);
    }

    async function submit() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังตรวจสลิป...';
      try {
        const formData = new FormData();
        formData.append('slip', slipFile);
        formData.append('lineUserId', profile.userId);
        formData.append('packageType', selectedPkg);
        formData.append('memberEmail', selectedEmail);

        const res = await fetch(`${BASE_URL}/api/renew`, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
          document.getElementById('alert-box').innerHTML =
            `<div class="alert success">✅ ต่ออายุสำเร็จ!<br>📧 ${selectedEmail}<br>📅 หมดอายุใหม่: ${data.expireDate}</div>`;
          btn.textContent = 'ต่ออายุสำเร็จแล้ว ✅';
        } else {
          document.getElementById('alert-box').innerHTML = `<div class="alert error">❌ ${data.error}</div>`;
          btn.disabled = false;
          btn.textContent = 'ยืนยันต่ออายุ';
        }
      } catch (err) {
        document.getElementById('alert-box').innerHTML = `<div class="alert error">เกิดข้อผิดพลาด กรุณาลองใหม่</div>`;
        btn.disabled = false;
        btn.textContent = 'ยืนยันต่ออายุ';
      }
    }

    init();
  </script>
</body>
</html>
