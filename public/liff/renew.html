<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ต่ออายุ - Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding-bottom: 40px; }
    .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px; display: flex; align-items: center; gap: 12px; }
    .header a { color: #fff; text-decoration: none; font-size: 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .current-card { background: #1a1a1a; border-radius: 12px; margin: 16px; padding: 16px; border: 1px solid #2a2a2a; }
    .current-card .label { font-size: 12px; color: #888; }
    .current-card .value { font-size: 16px; font-weight: 600; margin-top: 2px; }
    .expire-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 8px; }
    .expire-badge.red { background: #2a0a0a; color: #ef4444; border: 1px solid #ef4444; }
    .expire-badge.yellow { background: #2a1a00; color: #f59e0b; border: 1px solid #f59e0b; }
    .expire-badge.green { background: #0a2a0a; color: #22c55e; border: 1px solid #22c55e; }
    .section { margin: 0 16px 16px; }
    .section-title { font-size: 13px; color: #888; margin-bottom: 10px; }
    .pkg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pkg-card { background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .pkg-card.selected { border-color: #ff6b00; background: #1f1200; }
    .pkg-card .months { font-size: 11px; color: #888; }
    .pkg-card .price { font-size: 20px; font-weight: 700; color: #ff9500; margin: 4px 0; }
    .pkg-card .baht { font-size: 11px; color: #666; }
    .upload-box { background: #1a1a1a; border: 2px dashed #333; border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; }
    .upload-box.has-image { border-color: #22c55e; border-style: solid; }
    .upload-box img { max-width: 100%; border-radius: 8px; max-height: 200px; object-fit: contain; }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-text { font-size: 14px; color: #888; }
    input[type=file] { display: none; }
    .btn { width: 100%; background: #ff6b00; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    .btn:disabled { opacity: 0.4; }
    .alert { border-radius: 10px; padding: 12px 14px; margin-top: 12px; font-size: 14px; }
    .alert.error { background: #2a0a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .alert.success { background: #0a2a0a; border: 1px solid #22c55e; color: #86efac; }
    .loading-screen { text-align: center; padding: 60px 20px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">←</a>
    <h1>🔄 ต่ออายุ</h1>
  </div>

  <div id="loading-screen" class="loading-screen">กำลังโหลดข้อมูล...</div>
  <div id="main-content" style="display:none">
    <div class="current-card">
      <div class="label">สถานะปัจจุบัน</div>
      <div class="value" id="current-status">-</div>
      <div id="expire-badge" class="expire-badge">-</div>
    </div>

    <div class="section">
      <div class="section-title">เลือกแพ็กเกจที่ต้องการต่อ</div>
      <div class="pkg-grid">
        <div class="pkg-card" data-pkg="1month" onclick="selectPkg(this)">
          <div class="months">1 เดือน</div>
          <div class="price">79</div>
          <div class="baht">บาท</div>
        </div>
        <div class="pkg-card" data-pkg="2months" onclick="selectPkg(this)">
          <div class="months">2 เดือน</div>
          <div class="price">155</div>
          <div class="baht">บาท</div>
        </div>
        <div class="pkg-card" data-pkg="3months" onclick="selectPkg(this)">
          <div class="months">3 เดือน</div>
          <div class="price">230</div>
          <div class="baht">บาท</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">แนบสลิปโอนเงิน</div>
      <div class="upload-box" id="upload-box" onclick="document.getElementById('slip-input').click()">
        <div id="upload-placeholder">
          <div class="upload-icon">📎</div>
          <div class="upload-text">แตะเพื่อแนบสลิป</div>
        </div>
        <img id="slip-preview" style="display:none"/>
      </div>
      <input type="file" id="slip-input" accept="image/*" onchange="previewSlip(this)"/>
    </div>

    <div class="section">
      <div id="alert-box"></div>
      <button class="btn" id="submit-btn" onclick="submit()" disabled>ยืนยันต่ออายุ</button>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009843737-CwJgLFBY';
    const BASE_URL = window.location.origin;
    let profile = null;
    let selectedPkg = null;
    let slipFile = null;

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      profile = await liff.getProfile();

      const res = await fetch(`${BASE_URL}/api/member/${profile.userId}`);
      const data = await res.json();

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      if (data.found) {
        document.getElementById('current-status').textContent = `หมดอายุ ${data.expireDate}`;
        const badge = document.getElementById('expire-badge');
        const days = data.daysLeft;
        badge.textContent = `เหลืออีก ${days} วัน`;
        badge.className = 'expire-badge ' + (days > 7 ? 'green' : days > 0 ? 'yellow' : 'red');
      } else {
        document.getElementById('current-status').textContent = 'ไม่พบข้อมูลสมาชิก';
      }
    }
    init();

    function selectPkg(el) {
      document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedPkg = el.dataset.pkg;
      checkReady();
    }

    function previewSlip(input) {
      if (!input.files[0]) return;
      slipFile = input.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('slip-preview').src = e.target.result;
        document.getElementById('slip-preview').style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';
        document.getElementById('upload-box').classList.add('has-image');
      };
      reader.readAsDataURL(slipFile);
      checkReady();
    }

    function checkReady() {
      document.getElementById('submit-btn').disabled = !(selectedPkg && slipFile);
    }

    async function submit() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังตรวจสลิป...';
      try {
        const formData = new FormData();
        formData.append('slip', slipFile);
        formData.append('lineUserId', profile.userId);
        formData.append('packageType', selectedPkg);

        const res = await fetch(`${BASE_URL}/api/renew`, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
          document.getElementById('alert-box').innerHTML = `<div class="alert success">✅ ต่ออายุสำเร็จ! หมดอายุใหม่ ${data.expireDate}</div>`;
          btn.textContent = 'ต่ออายุสำเร็จแล้ว ✅';
        } else {
          document.getElementById('alert-box').innerHTML = `<div class="alert error">❌ ${data.error}</div>`;
          btn.disabled = false;
          btn.textContent = 'ยืนยันต่ออายุ';
        }
      } catch (err) {
        document.getElementById('alert-box').innerHTML = `<div class="alert error">เกิดข้อผิดพลาด กรุณาลองใหม่</div>`;
        btn.disabled = false;
        btn.textContent = 'ยืนยันต่ออายุ';
      }
    }
  </script>
</body>
</html>
