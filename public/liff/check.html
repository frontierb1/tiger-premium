<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เช็ควันหมดอายุ - Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding-bottom: 40px; }
    .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px; display: flex; align-items: center; gap: 12px; }
    .header a { color: #fff; text-decoration: none; font-size: 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .loading { text-align: center; padding: 80px 20px; color: #666; font-size: 15px; }
    .not-found { text-align: center; padding: 60px 20px; }
    .not-found .icon { font-size: 56px; margin-bottom: 16px; }
    .not-found p { color: #888; font-size: 15px; line-height: 1.6; }
    .not-found a { color: #ff9500; }
    .member-card { margin: 16px 16px 0; background: #1a1a1a; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a2a; }
    .card-top { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
    .email-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .email-value { font-size: 15px; font-weight: 600; color: #ff9500; word-break: break-all; }
    .days-number { font-size: 56px; font-weight: 700; line-height: 1; margin-top: 12px; }
    .days-number.green { color: #22c55e; }
    .days-number.yellow { color: #f59e0b; }
    .days-number.red { color: #ef4444; }
    .days-label { font-size: 13px; color: #888; margin-top: 4px; }
    .status-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px; }
    .status-badge.green { background: #0a2a0a; color: #22c55e; border: 1px solid #22c55e; }
    .status-badge.yellow { background: #2a1a00; color: #f59e0b; border: 1px solid #f59e0b; }
    .status-badge.red { background: #2a0a0a; color: #ef4444; border: 1px solid #ef4444; }
    .card-info { padding: 12px 20px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: #888; }
    .info-value { font-size: 13px; font-weight: 600; }
    .renew-btn { display: block; margin: 10px 16px 0; background: #ff6b00; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">←</a>
    <h1>📅 เช็ควันหมดอายุ</h1>
  </div>

  <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>

  <div id="not-found" class="not-found" style="display:none">
    <div class="icon">🔍</div>
    <p>ไม่พบข้อมูลสมาชิก<br><br>
    กรุณา <a href="register.html">สมัครสมาชิก</a> ก่อนนะครับ</p>
  </div>

  <div id="main-content" style="display:none"></div>

  <script>
    const LIFF_ID = '2009843737-CwJgLFBY';
    const BASE_URL = window.location.origin;
    const PKG = { '1month': '1 เดือน', '2months': '2 เดือน', '3months': '3 เดือน' };

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();

      const res = await fetch(`${BASE_URL}/api/members/${profile.userId}`);
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!data.found || data.members.length === 0) {
        document.getElementById('not-found').style.display = 'block';
        return;
      }

      document.getElementById('main-content').style.display = 'block';
      const container = document.getElementById('main-content');

      data.members.forEach((member, i) => {
        const days = member.daysLeft;
        const color = days > 7 ? 'green' : days > 0 ? 'yellow' : 'red';
        const statusText = days > 7 ? '✅ ใช้งานได้ปกติ' : days > 0 ? '⚠️ ใกล้หมดอายุ' : '❌ หมดอายุแล้ว';

        container.innerHTML += `
          <div class="member-card">
            <div class="card-top">
              <div class="email-label">อีเมลของคุณ</div>
              <div class="email-value">${member.houseEmail || '-'}</div>
              <div class="days-number ${color}">${days > 0 ? days : 0}</div>
              <div class="days-label">วันที่เหลือ</div>
              <div class="status-badge ${color}">${statusText}</div>
            </div>
            <div class="card-info">
              <div class="info-row">
                <div class="info-label">แพ็กเกจ</div>
                <div class="info-value">${PKG[member.package] || member.package}</div>
              </div>
              <div class="info-row">
                <div class="info-label">วันหมดอายุ</div>
                <div class="info-value">${member.expireDate}</div>
              </div>
            </div>
          </div>
          ${days <= 7 ? `<a href="renew.html" class="renew-btn">🔄 ต่ออายุเมล ${member.houseEmail || ''}</a>` : ''}
        `;
      });
    }
    init().catch(console.error);
  </script>
</body>
</html>
