<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ข้อมูลบ้าน - Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px; display: flex; align-items: center; gap: 12px; }
    .header a { color: #fff; text-decoration: none; font-size: 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .info-card { background: #1a1a1a; border-radius: 12px; margin: 16px; overflow: hidden; border: 1px solid #2a2a2a; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #222; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: #888; }
    .info-value { font-size: 14px; font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
    .copy-btn { background: #2a2a2a; border: none; color: #ff9500; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-left: 8px; flex-shrink: 0; }
    .copy-btn:active { background: #3a3a3a; }
    .warning { background: #1a1400; border: 1px solid #f59e0b; border-radius: 10px; margin: 0 16px; padding: 12px 14px; font-size: 13px; color: #fbbf24; }
    .loading-screen { text-align: center; padding: 60px 20px; color: #666; }
    .not-found { text-align: center; padding: 60px 20px; }
    .not-found .icon { font-size: 48px; margin-bottom: 12px; }
    .not-found p { color: #888; font-size: 14px; }
    .not-found a { color: #ff9500; }
    .section-title { font-size: 13px; color: #888; margin: 16px 16px 8px; }
    .expire-info { background: #1a1a1a; border-radius: 12px; margin: 0 16px 16px; padding: 14px 16px; border: 1px solid #2a2a2a; }
    .expire-days { font-size: 28px; font-weight: 700; color: #ff9500; }
    .expire-date { font-size: 13px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">←</a>
    <h1>🏠 ข้อมูลบ้าน</h1>
  </div>

  <div id="loading-screen" class="loading-screen">กำลังโหลดข้อมูล...</div>

  <div id="not-found" class="not-found" style="display:none">
    <div class="icon">🔍</div>
    <p>ไม่พบข้อมูลสมาชิก<br><br><a href="register.html">กด สมัครสมาชิก</a> ก่อนนะครับ</p>
  </div>

  <div id="main-content" style="display:none">
    <div class="expire-info">
      <div class="expire-days" id="days-left">- วัน</div>
      <div class="expire-date" id="expire-date">หมดอายุ -</div>
    </div>

    <div class="warning">⚠️ อย่าแชร์รหัสผ่านให้คนอื่น เพื่อความปลอดภัยของบ้าน</div>

    <div class="section-title">ข้อมูลเข้าบ้าน YouTube Premium</div>
    <div class="info-card">
      <div class="info-row">
        <div class="info-label">อีเมลหัวบ้าน</div>
        <div style="display:flex;align-items:center">
          <div class="info-value" id="house-email">-</div>
          <button class="copy-btn" onclick="copy('house-email')">คัดลอก</button>
        </div>
      </div>
      <div class="info-row">
        <div class="info-label">รหัสผ่าน</div>
        <div style="display:flex;align-items:center">
          <div class="info-value" id="house-password">-</div>
          <button class="copy-btn" onclick="copy('house-password')">คัดลอก</button>
        </div>
      </div>
      <div class="info-row">
        <div class="info-label">แพ็กเกจ</div>
        <div class="info-value" id="package">-</div>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009824186-wbJO3lkl';
    const BASE_URL = window.location.origin;
    const PKG_LABEL = { '1month': '1 เดือน (79 บาท)', '2months': '2 เดือน (155 บาท)', '3months': '3 เดือน (230 บาท)' };

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      const res = await fetch(`${BASE_URL}/api/member/${profile.userId}`);
      const data = await res.json();

      document.getElementById('loading-screen').style.display = 'none';

      if (!data.found || !data.houseEmail) {
        document.getElementById('not-found').style.display = 'block';
        return;
      }

      document.getElementById('main-content').style.display = 'block';
      document.getElementById('days-left').textContent = `เหลืออีก ${data.daysLeft} วัน`;
      document.getElementById('expire-date').textContent = `หมดอายุ ${data.expireDate}`;
      document.getElementById('house-email').textContent = data.houseEmail;
      document.getElementById('house-password').textContent = data.housePassword || '-';
      document.getElementById('package').textContent = PKG_LABEL[data.package] || data.package;
    }
    init();

    function copy(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = 'คัดลอกแล้ว ✓';
        setTimeout(() => btn.textContent = 'คัดลอก', 1500);
      });
    }
  </script>
</body>
</html>
