<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans Thai', -apple-system, sans-serif; background: #0c0c0c; color: #fff; min-height: 100vh; padding-bottom: 40px; }

    .header {
      background: linear-gradient(160deg, #1c0800 0%, #c94e00 55%, #ff9500 100%);
      padding: 40px 20px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '🐯';
      position: absolute;
      font-size: 180px;
      opacity: 0.06;
      top: -20px; right: -30px;
      line-height: 1;
      pointer-events: none;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    .status-card {
      margin: -28px 16px 0;
      background: #181818;
      border: 1px solid #272727;
      border-radius: 20px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 10;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .status-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .status-icon.green { background: rgba(34,197,94,0.15); }
    .status-icon.yellow { background: rgba(245,158,11,0.15); }
    .status-icon.red { background: rgba(239,68,68,0.15); }
    .status-icon.gray { background: rgba(255,255,255,0.06); }
    .status-info { flex: 1; }
    .status-info strong { display: block; font-size: 15px; font-weight: 700; }
    .status-info span { font-size: 12px; color: #666; margin-top: 2px; display: block; }
    .status-info.green strong { color: #22c55e; }
    .status-info.yellow strong { color: #f59e0b; }
    .status-info.red strong { color: #ef4444; }

    .skel { height: 15px; border-radius: 8px; background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%); background-size: 200% 100%; animation: skel 1.4s ease infinite; margin-bottom: 7px; }
    .skel.sm { width: 55%; height: 11px; margin-bottom: 0; }
    @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .section-title { font-size: 11px; font-weight: 700; color: #444; letter-spacing: 1px; text-transform: uppercase; padding: 22px 20px 10px; }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
    .menu-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 18px;
      padding: 20px 14px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s;
    }
    .menu-card:active { transform: scale(0.97); }

    .menu-card.orange { background: linear-gradient(135deg, #180f00, #1f1000); border-color: rgba(255,107,0,0.3); }
    .menu-card.blue   { background: linear-gradient(135deg, #060e1a, #091520); border-color: rgba(55,138,221,0.25); }
    .menu-card.green  { background: linear-gradient(135deg, #071208, #09180a); border-color: rgba(34,197,94,0.2); }
    .menu-card.red    { background: linear-gradient(135deg, #140808, #1c0c0c); border-color: rgba(239,68,68,0.25); }

    .menu-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .menu-card.orange .menu-icon { background: rgba(255,107,0,0.15); }
    .menu-card.blue   .menu-icon { background: rgba(55,138,221,0.12); }
    .menu-card.green  .menu-icon { background: rgba(34,197,94,0.12); }
    .menu-card.red    .menu-icon { background: rgba(239,68,68,0.12); }

    .menu-label { font-size: 14px; font-weight: 700; }
    .menu-sub   { font-size: 11px; }
    .menu-card.orange .menu-sub { color: rgba(255,149,0,0.6); }
    .menu-card.blue   .menu-sub { color: rgba(99,170,240,0.6); }
    .menu-card.green  .menu-sub { color: rgba(74,222,128,0.6); }
    .menu-card.red    .menu-sub { color: rgba(248,113,113,0.6); }

    /* ===== STATUS BANNER ===== */
    .status-banners { padding: 0 16px; margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .status-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .status-banner.pending {
      background: linear-gradient(135deg, #0d1a2e, #101f38);
      border: 1px solid rgba(55,138,221,0.3);
    }
    .status-banner.report {
      background: linear-gradient(135deg, #1a0d0d, #200f0f);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .status-banner.inviting {
      background: linear-gradient(135deg, #0d1a10, #0f2012);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .banner-icon { font-size: 22px; flex-shrink: 0; }
    .banner-info { flex: 1; }
    .banner-info strong { display: block; font-size: 13px; font-weight: 700; }
    .banner-info span { font-size: 11px; margin-top: 2px; display: block; opacity: 0.7; }
    .banner-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      animation: blink 1.5s ease infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .banner-dot.blue { background: #378ADD; }
    .banner-dot.red { background: #ef4444; }
    .banner-dot.green { background: #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-badge">🐯 Tiger Premium</div>
    <h1>YouTube Premium</h1>
    <p>Family Plan — ราคาพิเศษ</p>
  </div>

  <div class="status-card">
    <div class="status-icon gray" id="status-icon">⏳</div>
    <div class="status-info" id="status-info">
      <div class="skel" id="skel1"></div>
      <div class="skel sm" id="skel2"></div>
      <strong id="status-text" style="display:none"></strong>
      <span id="status-sub" style="display:none"></span>
    </div>
  </div>

  <div class="section-title">เมนูหลัก</div>
  <div class="menu-grid">
    <a href="register.html" class="menu-card orange">
      <div class="menu-icon">📋</div>
      <div class="menu-label">สมัครสมาชิก</div>
      <div class="menu-sub">เริ่มใช้งานได้เลย</div>
    </a>
    <a href="check.html" class="menu-card blue">
      <div class="menu-icon">📅</div>
      <div class="menu-label">เช็ควันหมดอายุ</div>
      <div class="menu-sub">ดูสถานะของคุณ</div>
    </a>
    <a href="renew.html" class="menu-card green">
      <div class="menu-icon">🔄</div>
      <div class="menu-label">ต่ออายุ</div>
      <div class="menu-sub">แนบสลิปยืนยัน</div>
    </a>
    <a href="report.html" class="menu-card red">
      <div class="menu-icon">🚨</div>
      <div class="menu-label">แจ้งปัญหา</div>
      <div class="menu-sub">ใช้งานไม่ได้?</div>
    </a>
  </div>

  <!-- สถานะงานค้าง -->
  <div class="status-banners" id="status-banners" style="display:none"></div>

  <script>
    const LIFF_ID = '2009843737-CwJgLFBY';
    const BASE_URL = window.location.origin;

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();

      // โหลด member + reports พร้อมกัน
      const [memberRes, reportRes] = await Promise.all([
        fetch(`${BASE_URL}/api/members/${profile.userId}`),
        fetch(`${BASE_URL}/api/admin/report/user/${profile.userId}`).catch(() => null),
      ]);
      const memberData = await memberRes.json();
      const reportData = reportRes ? await reportRes.json().catch(() => null) : null;

      // ซ่อน skeleton
      document.getElementById('skel1').style.display = 'none';
      document.getElementById('skel2').style.display = 'none';
      document.getElementById('status-text').style.display = 'block';
      document.getElementById('status-sub').style.display = 'block';

      const iconEl = document.getElementById('status-icon');
      const infoEl = document.getElementById('status-info');

      if (memberData.found && memberData.members && memberData.members.length > 0) {
        const first = memberData.members[0];
        const d = first.daysLeft;
        const cls = d > 7 ? 'green' : d > 0 ? 'yellow' : 'red';
        const icon = d > 7 ? '✅' : d > 0 ? '⚠️' : '❌';
        const text = d > 7 ? `ใช้งานได้ — เหลือ ${d} วัน` : d > 0 ? `ใกล้หมดอายุ — เหลือ ${d} วัน` : 'หมดอายุแล้ว';
        iconEl.textContent = icon;
        iconEl.className = `status-icon ${cls}`;
        infoEl.className = `status-info ${cls}`;
        document.getElementById('status-text').textContent = text;
        document.getElementById('status-sub').textContent = `หมดอายุ ${first.expireDate}`;
      } else {
        iconEl.textContent = '👋';
        iconEl.className = 'status-icon gray';
        infoEl.className = 'status-info';
        document.getElementById('status-text').textContent = 'ยังไม่ได้สมัครสมาชิก';
        document.getElementById('status-sub').textContent = 'กดสมัครสมาชิกได้เลยครับ';
      }

      // แสดง status banners
      renderBanners(memberData, reportData);
    }

    function renderBanners(memberData, reportData) {
      const banners = [];
      const members = memberData?.members || [];

      // เช็คสถานะแต่ละ row
      members.forEach(m => {
        if (m.inviteStatus === 'pending') {
          banners.push({
            type: 'pending',
            icon: '⏳',
            title: 'รอแอดมินดำเนินการ',
            sub: `อีเมล ${m.houseEmail || 'ของคุณ'} — รอส่งคำเชิญเข้า YouTube Premium`,
            dot: 'blue',
          });
        } else if (m.inviteStatus === 'inviting') {
          banners.push({
            type: 'inviting',
            icon: '📨',
            title: 'ส่งคำเชิญแล้ว — รอคุณกดรับ',
            sub: `กรุณาตรวจสอบอีเมล ${m.houseEmail || 'ของคุณ'} แล้วกด "ยอมรับคำเชิญ"`,
            dot: 'green',
          });
        }
      });

      // เช็คปัญหาที่แจ้งไว้
      if (reportData?.reports) {
        const openReports = reportData.reports.filter(r => r.status !== 'resolved');
        openReports.forEach(r => {
          banners.push({
            type: 'report',
            icon: '🔧',
            title: 'กำลังรอการแก้ไขจากแอดมิน',
            sub: `ปัญหา: ${r.detail || 'ที่คุณแจ้งไว้'} — ทีมงานกำลังดำเนินการ`,
            dot: 'red',
          });
        });
      }

      if (banners.length === 0) return;

      const container = document.getElementById('status-banners');
      container.style.display = 'flex';
      container.innerHTML = banners.map(b => `
        <div class="status-banner ${b.type}">
          <div class="banner-icon">${b.icon}</div>
          <div class="banner-info">
            <strong>${b.title}</strong>
            <span>${b.sub}</span>
          </div>
          <div class="banner-dot ${b.dot}"></div>
        </div>
      `).join('');
    }

    init().catch(console.error);
  </script>
</body>
</html>
