<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tiger Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* Header */
    .header {
      background: linear-gradient(160deg, #1a0800 0%, #ff6b00 60%, #ff9500 100%);
      padding: 36px 20px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
    }
    .header-logo { font-size: 44px; margin-bottom: 8px; position: relative; z-index: 1; }
    .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; position: relative; z-index: 1; }
    .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; position: relative; z-index: 1; }

    /* Status card */
    .status-card {
      margin: -24px 16px 0;
      background: #161616;
      border: 1px solid #242424;
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 2;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .status-dot.green { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.5); }
    .status-dot.yellow { background: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.5); }
    .status-dot.red { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }
    .status-info { flex: 1; }
    .status-info strong { display: block; font-size: 15px; font-weight: 700; }
    .status-info span { font-size: 12px; color: #888; margin-top: 2px; display: block; }
    .loading-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
    .loading-bar-inner { height: 100%; background: linear-gradient(90deg, #ff6b00, #ff9500); border-radius: 3px; animation: loading 1.2s ease infinite; width: 40%; }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    /* Menu */
    .menu-section { padding: 20px 16px 0; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .menu-card {
      background: #141414;
      border: 1px solid #202020;
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      display: block;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .menu-card:active { transform: scale(0.97); background: #1a1a1a; }
    .menu-card:active::before { opacity: 1; }
    .menu-card.primary { border-color: rgba(255,107,0,0.4); background: linear-gradient(135deg, #161616, #1a0c00); }
    .menu-card .icon { font-size: 28px; margin-bottom: 8px; }
    .menu-card .label { font-size: 14px; font-weight: 600; }
    .menu-card .sub { font-size: 11px; color: #666; margin-top: 4px; }
    .menu-card.primary .sub { color: rgba(255,149,0,0.7); }

    /* Report button */
    .report-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 16px 0;
      background: #160808;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 16px;
      padding: 14px 18px;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s;
    }
    .report-btn:active { background: #1f0a0a; transform: scale(0.98); }
    .report-btn .icon { font-size: 24px; flex-shrink: 0; }
    .report-btn .info { flex: 1; }
    .report-btn .info strong { display: block; font-size: 14px; font-weight: 600; color: #fca5a5; }
    .report-btn .info span { font-size: 12px; color: #888; margin-top: 2px; display: block; }
    .report-btn .arrow { color: #444; font-size: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">🐯</div>
    <h1>Tiger Premium</h1>
    <p>YouTube Premium Family</p>
  </div>

  <!-- Status card -->
  <div class="status-card" id="status-card">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-info">
      <div class="loading-bar" id="loading-bar">
        <div class="loading-bar-inner"></div>
      </div>
      <strong id="status-text" style="display:none">-</strong>
      <span id="status-sub" style="display:none">-</span>
    </div>
  </div>

  <!-- เมนูหลัก -->
  <div class="menu-section">
    <div class="menu-grid">
      <a href="register.html" class="menu-card primary">
        <div class="icon">📋</div>
        <div class="label">สมัครสมาชิก</div>
        <div class="sub">เริ่มใช้งานได้เลย</div>
      </a>
      <a href="check.html" class="menu-card">
        <div class="icon">📅</div>
        <div class="label">เช็ควันหมดอายุ</div>
        <div class="sub">ดูสถานะของคุณ</div>
      </a>
      <a href="renew.html" class="menu-card">
        <div class="icon">🔄</div>
        <div class="label">ต่ออายุ</div>
        <div class="sub">แนบสลิปยืนยัน</div>
      </a>
      <a href="check.html" class="menu-card">
        <div class="icon">📊</div>
        <div class="label">ข้อมูลของฉัน</div>
        <div class="sub">ดูสถานะทั้งหมด</div>
      </a>
    </div>

    <!-- ปุ่มแจ้งปัญหา -->
    <a href="report.html" class="report-btn">
      <div class="icon">🚨</div>
      <div class="info">
        <strong>แจ้งปัญหาการใช้งาน</strong>
        <span>ใช้งานไม่ได้? แจ้งแอดมินได้เลยครับ</span>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <script>
    const LIFF_ID = '2009843737-CwJgLFBY';
    const BASE_URL = window.location.origin;

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }

      const profile = await liff.getProfile();
      const res = await fetch(`${BASE_URL}/api/member/${profile.userId}`);
      const data = await res.json();

      // ซ่อน loading bar
      document.getElementById('loading-bar').style.display = 'none';
      document.getElementById('status-text').style.display = 'block';
      document.getElementById('status-sub').style.display = 'block';

      if (data.found) {
        const days = data.daysLeft;
        const dot = document.getElementById('status-dot');
        dot.className = 'status-dot ' + (days > 7 ? 'green' : days > 0 ? 'yellow' : 'red');
        document.getElementById('status-text').textContent =
          days > 7 ? `✅ ใช้งานได้ — เหลือ ${days} วัน`
          : days > 0 ? `⚠️ ใกล้หมดอายุ — เหลือ ${days} วัน`
          : `❌ สมาชิกหมดอายุแล้ว`;
        document.getElementById('status-sub').textContent = `หมดอายุ ${data.expireDate}`;
      } else {
        document.getElementById('status-dot').style.background = '#333';
        document.getElementById('status-text').textContent = 'ยังไม่ได้สมัครสมาชิก';
        document.getElementById('status-sub').textContent = 'กดสมัครสมาชิกด้านล่างได้เลยครับ';
      }
    }
    init().catch(console.error);
  </script>
</body>
</html>
